<!DOCTYPE html>
<html lang = "id">
  <head>
    <meta charset="utf-8">
    <title>Elclark - Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/assets/img/favicon/favicon.png" type="image/png" sizes="16x16">
    <link rel="icon" href="/assets/img/favicon/favicon32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/assets/img/favicon/favicon96x96.png" type="image/png" sizes="96x96">

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #232323;
        color: white;
        font-family: 'Comfortaa', cursive;
      }

      html, body{
        margin: 0;
        padding: 0;
        height: 100vh;
        min-height: 100vh; /* for firefox */
      }

      .center-container {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      a {
        color: #fff;
        opacity: 1;
        -o-transition:.5s;
        -ms-transition:.5s;
        -moz-transition:.5s;
        -webkit-transition:.5s;
        transition:.5s;
      }

      a:hover {
        opacity: 0.8;
        -o-transition:.5s;
        -ms-transition:.5s;
        -moz-transition:.5s;
        -webkit-transition:.5s;
        transition:.5s;
      }
    </style>
  </head>
  <body>
    <div class="center-container">
        <h1 style="margin: 0;">Nah Loh...</h1>
        <p style="display: inline-block; text-align: center; max-width: 400px;">Kamu mencoba mengakses <a href="#">Elclark</a> tapi kamu sedang Offline! Coba cek koneksimu, lalu coba refresh atau <a href="https://elclark.my.id/">klik sini</a> ya!</p>
    </div>
  </body>
</html>
